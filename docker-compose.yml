# ───────────────────────────────────────────────────────────────
# Docker Compose 配置文件
# ───────────────────────────────────────────────────────────────
#
# 【名词解释：Docker Compose】
# Docker Compose 是 Docker 官方提供的"多容器编排工具"。
# 它允许你用一份 YAML 文件定义一组相关的服务（数据库、消息队列、应用等），
# 然后一条命令（docker compose up）就能同时启动/停止/重建整个集群。
# 非常适合开发环境和中小型生产部署。
#
# 文件里用缩进来表示层级关系（类似 Python），对齐必须用空格，不能用 Tab。
#
# "version: '3.8'" 是 Compose 文件格式的版本号，新版 Docker 已经废弃这个字段，
# 但保留它不会影响功能。
version: "3.8"

# services 块：定义这个系统里所有要运行的容器（微服务、中间件等）。
services:
  # ─── RabbitMQ：消息队列中间件 ───
  rabbitmq:
    # image：指定容器要使用的 Docker 镜像。
    # rabbitmq:3-management-alpine 表示：
    #   - rabbitmq：官方 RabbitMQ 镜像
    #   - 3：主版本号 3.x
    #   - management：带管理插件（提供 Web 管理界面，端口 15672）
    #   - alpine：基于 Alpine Linux 构建，体积非常小（约几十 MB）
    image: rabbitmq:3-management-alpine

    # container_name：给容器起个固定名字，方便用 docker logs container_name 查看日志。
    # 如果不设，Docker 会自动生成类似 "multiindexer-rabbitmq-1" 的名字。
    container_name: mq-indexer

    # ports：端口映射，格式是 "宿主机端口:容器端口"。
    # 这样你打开浏览器访问 localhost:15672 就能进 RabbitMQ 管理界面。
    ports:
      - "5672:5672"   # 5672 是 AMQP 协议的标准端口，程序代码连的就是这个端口。
      - "15672:15672" # 15672 是 RabbitMQ Management 插件的 Web UI 端口。

    # environment：设置容器内部的环境变量。
    # RabbitMQ 官方镜像认这几个变量，用于创建默认管理员账号。
    environment:
      RABBITMQ_DEFAULT_USER: admin   # 默认用户名
      RABBITMQ_DEFAULT_PASS: admin   # 默认密码

    # volumes：数据持久化卷，防止容器删除后数据丢失。
    # rabbitmq_data 是一个"命名卷"（named volume），Docker 会自动在宿主机找个地方存放。
    # 右侧 /var/lib/rabbitmq 是 RabbitMQ 容器内存储数据的目录（消息、队列定义、用户等）。
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq

    # networks：让容器接入自定义的 Docker 网络，这样容器之间可以用服务名互相访问。
    networks:
      - indexer-net

    # healthcheck：健康检查配置。
    # Docker 会定期执行 test 里的命令，如果连续失败 retries 次，就认为容器不健康。
    # 这里用 rabbitmq-diagnostics ping 来检测 RabbitMQ 内部服务是否已就绪。
    # 其他服务可以通过 depends_on + condition: service_healthy 来等待 RabbitMQ 先启动好。
    healthcheck:
      test: rabbitmq-diagnostics -q ping
      interval: 10s    # 每 10 秒检查一次
      timeout: 5s      # 每次检查最多等 5 秒
      retries: 5       # 连续失败 5 次才标记为 unhealthy

  # ─── Listener：监听微服务 ───
  listener:
    # build：告诉 Docker Compose 这个服务不是直接用现成镜像，而是要现场构建。
    # ./listener 表示构建上下文（build context）是项目根目录下的 listener 文件夹，
    # Docker 会在这个文件夹里找 Dockerfile，按里面的指令一步步构建镜像。
    build: ./listener

    container_name: listener-service

    # environment：给 listener 容器注入环境变量。
    # 这些变量会被 listener/main.go 里的 getEnv 函数读取到。
    environment:
      # RABBITMQ_URL：RabbitMQ 的连接地址。
      # 注意这里的主机名写的是 "rabbitmq" 而不是 localhost 或 IP 地址。
      # 这是 Docker Compose 的网络魔法：同一个网络内的容器可以用服务名做 DNS 解析。
      - RABBITMQ_URL=amqp://admin:admin@rabbitmq:5672/
      # MODE=mock：告诉 listener 运行在模拟模式，自己生成假数据。
      - MODE=mock

    # depends_on：声明依赖关系，确保 rabbitmq 先启动。
    # condition: service_healthy 表示不仅等容器启动，还要等它的健康检查通过，
    # 防止 listener 在 RabbitMQ 还没完全就绪时就急着去连接导致失败。
    depends_on:
      rabbitmq:
        condition: service_healthy

    networks:
      - indexer-net

    # restart：重启策略。unless-stopped 表示：
    #   - 如果容器因为错误退出，Docker 会自动重启它。
    #   - 但如果你手动执行 docker compose stop，它就不会自动重启。
    # 这提高了系统的自愈能力，适合长时间运行的后台服务。
    restart: unless-stopped

  # ─── Fake-Indexer：伪索引微服务（测试用途）───
  fake-indexer:
    build: ./fake-indexer

    container_name: fake-indexer-service

    environment:
      - RABBITMQ_URL=amqp://admin:admin@rabbitmq:5672/

    # fake-indexer 也依赖 RabbitMQ，但它并不依赖 listener。
    # 在消息队列架构里，生产者和消费者是解耦的：
    #   消费者可以先启动，默默等待消息到来；
    #   生产者也可以先启动，消息会暂存在 Exchange/队列里等消费者来取。
    depends_on:
      rabbitmq:
        condition: service_healthy

    networks:
      - indexer-net

    restart: unless-stopped

# ─── 命名卷（Named Volumes）───
#
# 【名词解释：Volume（卷）】
# Docker 容器是"无状态"的，默认容器一删，里面的数据就全丢了。
# Volume 是 Docker 提供的一种持久化机制，把容器内的目录映射到宿主机的一块存储空间，
# 这样容器删除、重建后，数据还在。
# 命名卷由 Docker 自动管理路径，比直接绑定宿主机目录（bind mount）更干净、更跨平台。
volumes:
  rabbitmq_data:
    # 这里只声明了名字，没有额外配置，Docker 会使用默认的 local 驱动。

# ─── 自定义网络 ───
#
# 【名词解释：Docker Network（网络）】
# 默认情况下，Docker Compose 会给所有服务创建一个公共网络，让它们能互相通信。
# 显式声明一个 bridge 网络（indexer-net）有几个好处：
#   1. 网络隔离：这个项目的容器和宿主机上其他 Docker 项目互不干扰。
#   2. DNS 解析：容器之间可以用服务名（如 "rabbitmq"）直接 ping 通，不用记 IP。
#   3. 可控性：可以自定义子网、IP 范围、网关等高级参数（这里用默认）。
# bridge 是 Docker 默认的网络驱动模式，适合单机多容器通信。
networks:
  indexer-net:
    driver: bridge
