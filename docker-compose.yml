# ============================================================================
# docker-compose.yml — Docker 容器编排文件
# ============================================================================
# 这个文件定义了项目运行所需的全部基础设施服务（中间件）。
#
# 【Docker Compose 是什么？】
# Docker Compose 是一个用于定义和运行多容器 Docker 应用的工具。
# 用一个 YAML 文件描述所有服务（容器），一条命令全部启动：
#   docker compose up -d
#
# 【本项目架构：为什么 Go 程序不在 Docker 里？】
# 三个 Go 服务（listener, processor, fake-api）在本地编译运行，
# 只有中间件（RabbitMQ, MySQL, Redis）在 Docker 里。
# 原因：Docker Hub 在国内访问受限，拉取 golang 镜像和构建很慢。
# Go 编译出的静态二进制文件可以直接在 Windows/Linux 上运行，不依赖 Docker。
# ============================================================================

services:
  # ─── RabbitMQ：消息队列中间件 ───
  # 【RabbitMQ 概念】
  # RabbitMQ 是一个消息队列（Message Broker），负责在服务之间传递消息。
  # 工作模式：生产者（Listener）→ Exchange → Queue → 消费者（Processor）
  # 管理后台：http://localhost:15672 （用户名/密码：admin/admin）
  # AMQP 端口：5672（Go 程序通过这个端口连接）
  rabbitmq:
    image: rabbitmq:3-management-alpine    # 带管理插件的 RabbitMQ（Alpine 是精简版 Linux）
    container_name: mq-indexer             # 容器名（方便用 docker logs mq-indexer 查看日志）
    ports:
      - "5672:5672"    # AMQP 协议端口（宿主:容器），Go 程序连这个
      - "15672:15672"  # 管理后台 Web UI 端口
    environment:
      RABBITMQ_DEFAULT_USER: admin         # 默认用户名
      RABBITMQ_DEFAULT_PASS: admin         # 默认密码
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq    # 数据持久化：消息不因容器删除而丢失
    networks:
      - indexer-net                        # 加入自定义网络，方便容器间通信
    healthcheck:                           # 健康检查：确认 RabbitMQ 已就绪
      test: rabbitmq-diagnostics -q ping
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── MySQL：全量数据存储 ───
  # 【MySQL 概念】
  # MySQL 是关系型数据库（RDBMS），以表（行+列）的形式存储数据。
  # 本项目用 MySQL 存储所有链上事件，用于历史查询和统计分析。
  # 端口映射：3307:3306（宿主机 3307 映射到容器内 3306，避免和本地 MySQL 冲突）
  mysql:
    image: mysql:latest
    container_name: mysql-indexer
    ports:
      - "3307:3306"    # 宿主 3307 → 容器 3306
    environment:
      MYSQL_ROOT_PASSWORD: rootpass         # root 用户密码
      MYSQL_DATABASE: indexer              # 自动创建的数据库
      MYSQL_USER: indexer                  # 应用使用的用户名
      MYSQL_PASSWORD: indexerpass          # 应用用户的密码
    volumes:
      - mysql_data:/var/lib/mysql          # 数据持久化
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql  # 初始化脚本（首次启动自动执行）
    networks:
      - indexer-net
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-prootpass"]
      interval: 10s
      timeout: 5s
      retries: 10                          # MySQL 启动慢，重试次数设多一些

  # ─── Redis：热数据缓存 ───
  # 【Redis 概念】
  # Redis 是内存键值数据库，读写极快（微秒级）。
  # 本项目用 Redis 做热数据缓存：存最近的交易，MySQL 存全量历史。
  # 查询"最新 20 条交易"时从 Redis 读（快），查"3 天前的交易"从 MySQL 读（慢但全）。
  redis:
    image: redis:latest
    container_name: redis-indexer
    ports:
      - "6379:6379"    # Redis 默认端口
    volumes:
      - redis_data:/data                    # 数据持久化（Redis 定期快照保存到这里）
    networks:
      - indexer-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]   # PING → 应返回 PONG
      interval: 10s
      timeout: 5s
      retries: 5

# ============================================================================
# 数据卷（Volumes）
# ============================================================================
# 【Docker 概念：Volume（数据卷）】
# Volume 是 Docker 管理的数据存储，独立于容器的生命周期。
# 没有 volume，容器删除后所有数据都会丢失。
# 有了 volume，即使删除容器、升级镜像，数据还在。
# 这些 volume 由 Docker 管理，存储在 /var/lib/docker/volumes/ 下。
volumes:
  rabbitmq_data:    # RabbitMQ 消息和配置
  mysql_data:       # MySQL 数据库文件
  redis_data:       # Redis 快照文件

# ============================================================================
# 网络（Networks）
# ============================================================================
# 【Docker 概念：Network（网络）】
# 自定义网络 indexer-net 让所有容器能通过容器名互相访问。
# 例如在同一个网络内，MySQL 容器可以通过 "mysql-indexer:3306" 被访问。
# 驱动 bridge 是默认的网络驱动，适合单机多容器通信。
networks:
  indexer-net:
    driver: bridge
